name: Build & Deploy to Lightsail

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend: build Spring Boot JAR ──────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build backend JAR
        run: cd backend && ./mvnw clean package -DskipTests

      # ── Frontend: build Angular app ─────────────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend (production)
        run: cd frontend && npm run build

      # ── Deploy to Lightsail ─────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend JAR
        run: |
          JAR=$(ls backend/target/*.jar | grep -v plain | head -1)
          scp -i ~/.ssh/deploy_key "$JAR" \
            ubuntu@${{ secrets.LIGHTSAIL_HOST }}:/opt/tiptracker/tiptracker.jar

      - name: Deploy frontend build
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            frontend/dist/frontend/ \
            ubuntu@${{ secrets.LIGHTSAIL_HOST }}:/var/www/tiptracker/

      - name: Restart backend service
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.LIGHTSAIL_HOST }} \
            "sudo systemctl restart tiptracker && sudo systemctl status tiptracker --no-pager"
