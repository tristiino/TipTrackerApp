# ========================================================
# LOCAL DEV PROFILE  (spring.profiles.active=local)
# Uses H2 in-memory database — no MySQL or env vars needed.
# DO NOT use this profile in production.
# ========================================================

# --- H2 in-memory database ---
spring.datasource.url=jdbc:h2:mem:tiptracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 web console (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

