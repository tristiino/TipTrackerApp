# === Application Info ===
spring.application.name=tiptracker-backend

# === MySQL Configuration ===
# Local MySQL instance on the Lightsail server
spring.datasource.url=jdbc:mysql://localhost:3306/tiptracker
spring.datasource.username=tiptracker_user
# Password is provided via environment variable DB_PASSWORD (see systemd EnvironmentFile)
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# === JWT Settings ===
# Secret and expiration are provided via environment variables.
# These keys are NOT stored in the repo; Spring reads them from the environment.
#   APP_JWT_SECRET      - Base64-encoded secret key
#   APP_JWT_EXPIRATION  - Token lifetime in milliseconds (e.g., 86400000 for 24h)
APP_JWT_EXPIRATION=${APP_JWT_EXPIRATION:86400000}

# === Logging ===
logging.level.org.springframework.security=WARN