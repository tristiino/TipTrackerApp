# ======== Database Configuration (tests) ========
spring.datasource.url=jdbc:mysql://localhost:3306/tiptracker
spring.datasource.username=tiptracker_user
# For tests, the password can also be injected via environment variable.
spring.datasource.password=${DB_PASSWORD:test_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ======== JWT Configuration (tests) ========
# Use the same environment-based configuration as production. A default expiration
# is provided for convenience, but the secret must come from the environment.
APP_JWT_EXPIRATION=${APP_JWT_EXPIRATION:86400000}

# Server Port (optional override)
server.port=8080