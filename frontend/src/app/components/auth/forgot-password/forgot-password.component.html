<div class="forgot-page-container">
  <div class="forgot-card">
    <h2>Reset Password</h2>
    <p class="greeting-message">
      Enter your email and we'll send you a reset link.
    </p>

    <ng-container *ngIf="!submitted; else successBlock">
      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="you@example.com"
            autocomplete="email"
          />
          <div
            *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched"
            class="field-error"
          >
            A valid email is required.
          </div>
        </div>

        <button type="submit" class="btn-submit" [disabled]="forgotForm.invalid || loading">
          <span *ngIf="!loading">Send Reset Link</span>
          <span *ngIf="loading">Sending…</span>
        </button>
      </form>
    </ng-container>

    <ng-template #successBlock>
      <div class="message-container">
        <p class="success-message">
          If that email is registered, a reset link has been sent.
        </p>
      </div>
    </ng-template>

    <p class="back-link">
      <a routerLink="/login">Back to Login</a>
    </p>
  </div>
</div>
