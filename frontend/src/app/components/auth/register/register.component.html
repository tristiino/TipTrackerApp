<div class="register-page-container">
  <div class="register-card">
    <h2>Create Account</h2>
    <p class="greeting-message">
      Join today to start tracking your tips.
    </p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" formControlName="username" autocomplete="off" placeholder="e.g. jsmith"/>
        <div *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched" class="error">
          Username is required.
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" autocomplete="off" placeholder="you@example.com"/>
        <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="error">
          A valid email is required.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" autocomplete="off" placeholder="••••••••"/>
        <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="error">
          Password must be at least 6 characters.
        </div>
      </div>

      <button type="submit" [disabled]="registerForm.invalid" class="btn-submit">
        Register
      </button>

      <div *ngIf="errorMessage" class="message-container">
        <p class="error-message">{{ errorMessage }}</p>
      </div>
    </form>
  </div>
</div>
