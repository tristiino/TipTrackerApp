<div class="reset-page-container">
  <div class="reset-card">
    <h2>New Password</h2>
    <p class="greeting-message">
      Choose a strong password for your account.
    </p>

    <!-- No token present -->
    <ng-container *ngIf="!token; else formBlock">
      <div class="message-container">
        <p class="error-message">
          This link is missing a reset token. Please
          <a routerLink="/forgot-password">request a new reset link</a>.
        </p>
      </div>
    </ng-container>

    <ng-template #formBlock>
      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input
            type="password"
            id="newPassword"
            formControlName="newPassword"
            placeholder="••••••••"
            autocomplete="new-password"
          />
          <div
            *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched"
            class="field-error"
          >
            Password must be at least 6 characters.
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            formControlName="confirmPassword"
            placeholder="••••••••"
            autocomplete="new-password"
          />
          <div
            *ngIf="resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched"
            class="field-error"
          >
            Passwords do not match.
          </div>
        </div>

        <button
          type="submit"
          class="btn-submit"
          [disabled]="resetForm.invalid || loading"
        >
          <span *ngIf="!loading">Set New Password</span>
          <span *ngIf="loading">Saving…</span>
        </button>

        <div *ngIf="errorMessage" class="message-container">
          <p class="error-message">{{ errorMessage }}</p>
        </div>
      </form>
    </ng-template>

    <p class="back-link">
      <a routerLink="/login">Back to Login</a>
    </p>
  </div>
</div>
