<div class="quick-add-backdrop" *ngIf="quickAdd.isOpen$ | async" (click)="onBackdropClick($event)">
  <div class="quick-add-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <!-- Header -->
    <div class="modal-header">
      <h3 id="modal-title">Quick Add Tip</h3>
      <button class="modal-close" (click)="close()" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <!-- Success state -->
    <div class="modal-success" *ngIf="success">
      <svg width="48" height="48" viewBox="0 0 24 24"><path fill="#198754" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5l-3.5-3.5 1.41-1.41L10 13.67l7.09-7.09L18.5 8l-8.5 8.5z"/></svg>
      <p>Tip added successfully!</p>
    </div>

    <!-- Form -->
    <form *ngIf="!success" [formGroup]="form" (ngSubmit)="onSubmit()">

      <!-- Tips row -->
      <div class="modal-field">
        <label class="field-label">Tips</label>
        <div class="tip-inputs">
          <div class="tip-input-group">
            <span class="tip-input-label">Cash</span>
            <input type="number" formControlName="cashTips" placeholder="0.00" min="0" step="0.01" />
          </div>
          <div class="tip-input-group">
            <span class="tip-input-label">Credit</span>
            <input type="number" formControlName="creditTips" placeholder="0.00" min="0" step="0.01" />
          </div>
        </div>
        <div class="tip-total" *ngIf="totalTips > 0">
          Total <strong>{{ totalTips | currency }}</strong>
        </div>
      </div>

      <!-- Date -->
      <div class="modal-field">
        <label class="field-label" for="qa-date">Date</label>
        <input id="qa-date" type="date" formControlName="date" />
      </div>

      <!-- Shift type -->
      <div class="modal-field">
        <label class="field-label">Shift</label>
        <div class="shift-buttons">
          <button type="button" (click)="selectShift('Morning')" [class.active]="form.get('shiftType')?.value === 'Morning'">Morning</button>
          <button type="button" (click)="selectShift('Evening')" [class.active]="form.get('shiftType')?.value === 'Evening'">Evening</button>
          <button type="button" (click)="selectShift('Night')"   [class.active]="form.get('shiftType')?.value === 'Night'">Night</button>
        </div>
      </div>

      <!-- Job selector (P2-008) -->
      <div class="modal-field" *ngIf="jobs.length > 0">
        <label class="field-label">Job <span class="optional">(optional)</span></label>
        <select class="modal-select" [(ngModel)]="selectedJobId" [ngModelOptions]="{standalone: true}">
          <option [ngValue]="null">— Unassigned —</option>
          <option *ngFor="let job of jobs" [ngValue]="job.id">{{ job.name }}<ng-container *ngIf="job.location"> · {{ job.location }}</ng-container></option>
        </select>
      </div>

      <!-- Shift times (optional) -->
      <div class="modal-field">
        <label class="field-label">Shift Times <span class="optional">(optional)</span></label>
        <div class="time-inputs">
          <div class="time-input-group">
            <span class="time-label">Start</span>
            <input type="time" formControlName="startTime" />
          </div>
          <div class="time-input-group">
            <span class="time-label">End</span>
            <input type="time" formControlName="endTime" />
          </div>
        </div>
        <div class="hours-badge" *ngIf="hoursWorked !== null">{{ hoursWorked }}h worked</div>
      </div>

      <!-- Tip-Out Roles (filtered by job — P2-011) -->
      <div class="modal-field" *ngIf="filteredRoles.length > 0">
        <label class="field-label">Tip-Outs</label>
        <div class="tipout-role-list">
          <label class="tipout-role-option" *ngFor="let role of filteredRoles">
            <input type="checkbox" [checked]="isRoleSelected(role.id!)" (change)="toggleRole(role.id!)" />
            <span class="role-label">{{ formatRoleLabel(role) }}</span>
            <span class="role-preview" *ngIf="isRoleSelected(role.id!) && totalTips > 0">
              -${{ getRolePreviewAmount(role) | number:'1.2-2' }}
            </span>
          </label>
        </div>
        <div class="tipout-preview" *ngIf="selectedRoleIds.length > 0 && totalTips > 0">
          <span>Tip-out: <strong>-${{ estimatedTipOut | number:'1.2-2' }}</strong></span>
          <span class="preview-separator"> · </span>
          <span>Your take-home: <strong>${{ estimatedNet | number:'1.2-2' }}</strong></span>
        </div>
      </div>

      <!-- Error -->
      <p class="modal-error" *ngIf="errorMsg">{{ errorMsg }}</p>

      <!-- Actions -->
      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="close()">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="form.invalid || submitting">
          {{ submitting ? 'Saving…' : 'Add Tip' }}
        </button>
      </div>

    </form>
  </div>
</div>
