<div class="settings-container">
  <div class="settings-header">
    <h2>{{ translations['settingsTitle'] }}</h2>
    <p>Manage your application preferences and defaults.</p>
  </div>

  <div class="settings-card">
    <form [formGroup]="settingsForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="taxRate">{{ translations['taxRate'] }}</label>
        <input type="number" id="taxRate" formControlName="taxRate" min="0" />
      </div>

      <div class="form-group">
        <label for="theme">{{ translations['theme'] }}</label>
        <select id="theme" formControlName="theme" (change)="applyTheme($event)">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <div class="form-group">
        <label for="language">{{ translations['language'] }}</label>
        <select id="language" formControlName="language" (change)="applyLanguage($event)">
          <option value="english">English</option>
          <option value="spanish">Spanish</option>
        </select>
      </div>

      <div class="form-group pay-period-group">
        <label>Pay Period</label>
        <div class="pay-period-inputs">
          <div class="pay-period-field">
            <span class="pay-period-field-label">Start</span>
            <input type="date" id="payPeriodStart" formControlName="payPeriodStart" />
          </div>
          <span class="pay-period-sep">to</span>
          <div class="pay-period-field">
            <span class="pay-period-field-label">End</span>
            <input type="date" id="payPeriodEnd" formControlName="payPeriodEnd" />
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onReset()">{{ translations['reset'] }}</button>
        <button type="submit" class="btn btn-primary" [disabled]="!settingsForm.valid">{{ translations['save'] }}</button>
      </div>
    </form>
  </div>

  <div class="logout-section">
    <button type="button" class="btn btn-logout" (click)="logout()">Logout</button>
  </div>
</div>
