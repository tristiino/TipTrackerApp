<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="barGradMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="barGradLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Icon mark (64x64) -->
  <rect width="64" height="64" rx="14" fill="#1e3a5f"/>
  <rect x="8"  y="36" width="13" height="20" rx="2.5" fill="url(#barGradLight)"/>
  <rect x="26" y="24" width="13" height="32" rx="2.5" fill="url(#barGradMid)"/>
  <rect x="44" y="10" width="13" height="46" rx="2.5" fill="url(#barGrad)"/>
  <path d="M14.5 38 Q32.5 20 50.5 14"
        stroke="#f97316" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="50.5" cy="14" r="4" fill="#f97316"/>

  <!-- Wordmark -->
  <text x="78" y="38"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#1e3a5f">tip</tspan><tspan fill="#2563eb">tracker</tspan><tspan fill="#f97316">app</tspan>
  </text>

  <!-- Tagline -->
  <text x="79" y="54"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="9" fill="#94a3b8" letter-spacing="1.5" font-weight="500">
    YOUR EARNINGS HUB
  </text>
